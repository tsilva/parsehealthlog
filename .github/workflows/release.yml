name: Release

on:
  push:
    branches: [main]
    paths: [parsehealthlog/__init__.py]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check release targets
        id: check-version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(python - <<'PY'
          import re
          import tomllib

          with open("pyproject.toml", "rb") as f:
              config = tomllib.load(f)

          project = config.get("project", {})
          if "version" in project:
              print(project["version"])
          elif "version" in project.get("dynamic", []):
              version_path = config.get("tool", {}).get("hatch", {}).get("version", {}).get("path")
              if not version_path:
                  raise ValueError("Dynamic version specified but no hatch.version.path found")
              with open(version_path) as vf:
                  match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', vf.read())
              if not match:
                  raise ValueError(f"Could not find __version__ in {version_path}")
              print(match.group(1))
          else:
              raise ValueError("No version found in pyproject.toml")
          PY
          )
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          else
            RELEASE_EXISTS=false
          fi
          echo "release_exists=$RELEASE_EXISTS" >> "$GITHUB_OUTPUT"

          PYPI_EXISTS=$(python - "$VERSION" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          url = f"https://pypi.org/pypi/parsehealthlog/{sys.argv[1]}/json"
          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  print("true" if response.status == 200 else "false")
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("false")
              else:
                  raise
          PY
          )
          echo "pypi_exists=$PYPI_EXISTS" >> "$GITHUB_OUTPUT"

          if [ "$RELEASE_EXISTS" = "true" ] && [ "$PYPI_EXISTS" = "true" ]; then
            echo "fully_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "fully_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup uv
        if: steps.check-version.outputs.fully_published == 'false'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Build package
        if: steps.check-version.outputs.fully_published == 'false'
        run: uv build
      - name: Publish to PyPI
        if: steps.check-version.outputs.pypi_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release
        if: steps.check-version.outputs.release_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ github.token }}
